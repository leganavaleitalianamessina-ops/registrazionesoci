<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-In Aspiranti Soci</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <header class="text-center mb-4">
                    <h1>Verifica Codice Accesso</h1>
                    <p class="lead">Inserisci la chiave di contatto e il codice di riferimento per il check-in.</p>
                </header>

                <div id="output-message-checkin" class="alert d-none" role="alert"></div>

                <form id="checkinForm" onsubmit="handleCheckIn(event)">
                    
                    <div class="mb-3">
                        <label for="chiave_accesso" class="form-label">Chiave (Email o Telefono):</label>
                        <input type="text" class="form-control" id="chiave_accesso" name="chiave_accesso" placeholder="Inserisci Email o Telefono usato per la registrazione" required>
                    </div>
                    <div class="mb-3">
                        <label for="codice_accesso" class="form-label">Codice Riferimento (Numerico O Scansione QR):</label>
                        <input type="text" class="form-control" id="codice_accesso" name="codice_accesso" placeholder="Inserisci il codice COD-xxxxxx o solo la parte numerica" required>
                        <div class="form-text">Il codice si trova nell'email di conferma iscrizione, sotto il QR Code.</div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-3">Verifica e Registra Check-In</button>
                </form>

                <div id="risultati_checkin" class="mt-4 p-3 border rounded">
                    </div>

                <footer class="text-center mt-4">
                    <p><a href="index.html">Torna al Modulo di Iscrizione</a></p>
                </footer>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
